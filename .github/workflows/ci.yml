name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint-and-test:
    name: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Actions pinned to commit SHAs (never @vN — tags are mutable). No Dependabot
      # by choice; review these pins periodically, they do NOT auto-update.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # Single source of truth for the toolchain: rust-toolchain.toml. This dtolnay
      # pin needs an explicit `toolchain` input and does not read the file itself.
      - name: resolve toolchain
        id: rust
        run: echo "channel=$(sed -n 's/^channel = \"\(.*\)\"/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master @ 2026-06-30
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: fmt check
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: hook installer test
        run: bash tests/install_hook_test.sh
      - name: vendored registry matches shipped default
        # The self-contained test corpus snapshot must not drift from the shipped
        # baseline the CLI actually loads.
        run: diff checkpoints.yaml tests/corpus/promise/checkpoints.yaml
  docker:
    name: docker-build-and-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: build image
        # Retry once — docker layer pulls are network-bound.
        run: docker build -t commitward:ci . || docker build -t commitward:ci .
      - name: smoke
        run: docker run --rm commitward:ci --help | grep -qi usage
      - name: smoke gate (envelope subcommand, network-free)
        run: |
          # A path checkpoint fires on a CLAUDE.md change with no HITL-ACK → exit_class 2 in the body
          # (the process still exits 0 — the decision is data, not the exit code).
          req='{"name_status":"M\tCLAUDE.md","commit_msg":"docs: x","global_registry_yaml":"version: \"1\"\ncheckpoints:\n  - name: cm\n    summary: s\n    paths:\n      - CLAUDE\n"}'
          out="$(printf '%s' "$req" | docker run --rm -i --network none commitward:ci gate)"
          echo "$out"
          echo "$out" | grep -q '"status":"ok"'
          echo "$out" | grep -q '"exit_class":2'
          # A malformed request must surface the error sentinel, not a false clean pass.
          err="$(echo 'nope' | docker run --rm -i --network none commitward:ci gate || true)"
          echo "$err" | grep -q '"status":"error"'
